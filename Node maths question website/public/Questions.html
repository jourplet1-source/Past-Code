<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <script src="Java-Maths.js" defer></script>
</head>
<body>
    <h1>Questions</h1>
    <section id="Q-area"> <!--Ids and sectins are heavily used so that different parts of the code can be freely replaced-->
        <h2 id="Q-Correct"></h2>
        <h2 id="Q-Number">Question 1:</h2>
        <p id="Q-Descriptor">Loading...</p><!--I set the question's default state as Loading so that if AWS is slow for whatever reason, it will be clear that the questions aren't there yet-->
        <section id="entry">
            <label for="Q-ans">Answer:</label>
            <input type="text" name="Q-ans" id="Q-ans"><br><br>
        </section>
    <input type="submit" value="Submit" id="Submit">
    </section>
</body>
</html>
